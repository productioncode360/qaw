<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam News AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}
textarea, button {
  width: 90%;
  padding: 12px;
  margin: 10px;
  border-radius: 8px;
}
button {
  background: #38bdf8;
  font-weight: bold;
}
#output {
  background: black;
  padding: 15px;
  margin-top: 20px;
  white-space: pre-wrap;
}
</style>

</head>
<body>

<h2>📊 Exam News AI</h2>

<textarea id="prompt">Give 5 short SSC and UPSC news of TODAY</textarea>
<br>
<input type="date" id="dateInput">

<br>
<button onclick="getNews()">🚀 Get News</button>

<div id="output">Result will appear here...</div>

<script>
document.getElementById("dateInput").value =
  new Date().toISOString().split("T")[0];

async function getNews() {
  const prompt = document.getElementById("prompt").value;
  const date = document.getElementById("dateInput").value;

  const output = document.getElementById("output");
  output.innerText = "⏳ Loading...";

  try {
    const res = await fetch("/news", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt, date })
    });

    const data = await res.json();
    output.innerText = data.result;
  } catch (err) {
    output.innerText = "❌ Error connecting to server";
  }
}
</script>

</body>
</html>
