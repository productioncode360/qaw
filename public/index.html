<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exam News AI (Smart v2)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 30px;
      text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
    }
    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      border: 1px solid #334155;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #94a3b8;
    }
    input, textarea, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }
    input:focus, textarea:focus, select:focus {
      outline: 2px solid #38bdf8;
    }
    textarea {
      resize: vertical;
      height: 100px;
      background: #0f172a;
      color: #fff;
      border: 1px solid #334155;
    }
    input[type="date"], input[type="number"], select {
      background: #0f172a;
      color: #fff;
      border: 1px solid #334155;
    }
    button {
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }
    button:hover {
      background: #0ea5e9;
      transform: translateY(-2px);
    }
    .stop-btn {
      background: #ef4444 !important;
      color: white !important;
    }
    .stop-btn:hover {
      background: #dc2626 !important;
    }
    #responseBox {
      height: 350px;
      overflow-y: auto;
      white-space: pre-wrap;
      background: #020617;
      padding: 16px;
      border-radius: 10px;
      font-size: 15px;
      line-height: 1.6;
      border: 1px solid #1e293b;
      color: #cbd5e1;
    }
    .timeRow {
      display: flex;
      gap: 12px;
    }
    .timeRow input, .timeRow select {
      flex: 1;
    }
    .daily-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      color: #38bdf8;
      cursor: pointer;
    }
    input[type="checkbox"] {
      width: auto;
      accent-color: #38bdf8;
      transform: scale(1.4);
    }
    .hint {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 6px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>📊 Exam News AI (Smart v2)</h1>

  <div class="box">
    <label>Prompt (Custom instructions)</label>
    <textarea id="prompt">Give 5-20 short SSC, UPSC and govt exam related news of TODAY. Only big updates, dates, notifications.</textarea>
    <div class="hint">Example: "Only SSC CGL updates" ya "UPSC and Banking news"</div>
  </div>

  <div class="box">
    <div style="display: flex; gap: 15px;">
      <div style="flex: 1;">
        <label>Select Date</label>
        <input type="date" id="dateInput">
      </div>
      <div style="flex: 1;">
        <label class="daily-label" style="margin-top: 35px;">
          <input type="checkbox" id="dailyCheck"> Daily Auto-Fetch
        </label>
      </div>
    </div>
  </div>

  <div class="box">
    <label>Set Schedule Time</label>
    <div class="timeRow">
      <input type="number" id="hourInput" placeholder="HH (1-12)" min="1" max="12">
      <input type="number" id="minuteInput" placeholder="MM (00-59)" min="0" max="59">
      <select id="ampmInput">
        <option value="AM">AM</option>
        <option value="PM" selected>PM</option>
      </select>
    </div>
    <button onclick="startTimer()">🚀 Start / Schedule</button>
    <button class="stop-btn" onclick="stopTimer()">⛔ Stop All Timers</button>
  </div>

  <div class="box">
    <label>Live Response</label>
    <div id="responseBox">System Ready... Time set karke Start dabayein ya direct news ke liye "Start" click karein.</div>
  </div>
</div>

<script>
  // Set default date to today
  const dateInput = document.getElementById("dateInput");
  dateInput.value = new Date().toISOString().split("T")[0];

  let timeoutId = null;

  function saveSchedule(data) {
    localStorage.setItem("examNewsSchedule", JSON.stringify(data));
  }

  async function fetchNews() {
    const prompt = document.getElementById("prompt").value.trim();
    const date = document.getElementById("dateInput").value;
    const box = document.getElementById("responseBox");
    
    box.innerHTML = "<b style='color: #38bdf8;'>⚡ Fetching latest updates... Please wait.</b>";

    try {
      // ✅ Relative path for seamless deployment (Render/Vercel)
      const res = await fetch("/news", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt, date })
      });
      
      const data = await res.json();
      box.innerText = data.result || "No major updates found for this selection.";
    } catch (e) {
      box.innerText = "❌ Error: Could not connect to server. Make sure backend is running.";
      console.error("Fetch Error:", e);
    }
  }

  function loadAndCheckSchedule() {
    const saved = localStorage.getItem("examNewsSchedule");
    if (!saved) return;

    const s = JSON.parse(saved);
    const now = new Date();
    let target = new Date(now);
    
    let targetHour = parseInt(s.hour);
    if (s.ampm === "PM" && targetHour !== 12) targetHour += 12;
    if (s.ampm === "AM" && targetHour === 12) targetHour = 0;

    target.setHours(targetHour, parseInt(s.minute), 0, 0);

    // If time already passed, set for tomorrow if daily is ON
    if (target <= now) {
      if (s.daily) {
        target.setDate(target.getDate() + 1);
      } else {
        // Immediate trigger for missed one-time schedule
        fetchNews();
        localStorage.removeItem("examNewsSchedule");
        return;
      }
    }

    const delay = target - now;
    document.getElementById("responseBox").innerText = `⏳ Next update scheduled at: ${s.hour}:${s.minute.toString().padStart(2,'0')} ${s.ampm}`;

    timeoutId = setTimeout(() => {
      fetchNews();
      if (s.daily) {
        loadAndCheckSchedule(); // Re-run for next day
      } else {
        localStorage.removeItem("examNewsSchedule");
      }
    }, delay);
  }

  function startTimer() {
    if (timeoutId) clearTimeout(timeoutId);
    
    const hour = document.getElementById("hourInput").value;
    const minute = document.getElementById("minuteInput").value;
    const ampm = document.getElementById("ampmInput").value;
    const daily = document.getElementById("dailyCheck").checked;

    // Manual instant fetch if no time is entered
    if (!hour || !minute) {
        fetchNews();
        return;
    }

    saveSchedule({ hour, minute, ampm, daily });
    loadAndCheckSchedule();
    alert("Schedule set successfully!");
  }

  function stopTimer() {
    if (timeoutId) clearTimeout(timeoutId);
    localStorage.removeItem("examNewsSchedule");
    document.getElementById("responseBox").innerText = "⛔ All timers stopped.";
  }

  // Check schedule on page load
  window.onload = loadAndCheckSchedule;
</script>

</body>
</html>
